spring.application.name=expense-tracker-api

# Local dev defaults, matching docker-compose.yml's postgres service.
# In production (Railway), override via SPRING_DATASOURCE_URL/USERNAME/PASSWORD env vars -
# Railway's own DATABASE_URL is a bare URI (postgres://...), not a JDBC URL, so it can't be
# used directly here.
spring.datasource.url=jdbc:postgresql://localhost:5432/expense_tracker
spring.datasource.username=expense_tracker
spring.datasource.password=expense_tracker

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

logging.structured.format.console=ecs

# Comma-separated list; add the production Vercel origin here (or via env var) at deploy time.
app.cors.allowed-origins=http://localhost:3000
