name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend (apps/api)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18.4
        env:
          POSTGRES_DB: expense_tracker
          POSTGRES_USER: expense_tracker
          POSTGRES_PASSWORD: expense_tracker
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U expense_tracker -d expense_tracker"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 15
          --health-start-period 10s
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: maven
      - name: Test
        working-directory: apps/api
        run: mvn -B test

  frontend:
    name: Frontend (apps/web)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install dependencies
        working-directory: apps/web
        run: npm ci
      - name: Lint
        working-directory: apps/web
        run: npm run lint
      - name: Test
        working-directory: apps/web
        run: npm test
      - name: Build
        working-directory: apps/web
        run: npm run build
